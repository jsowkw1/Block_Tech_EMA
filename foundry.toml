[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

solc_version = "0.8.24"
evm_version = "cancun"

optimizer = true
optimizer_runs = 200

verbosity = 3

fs_permissions = [
    { access = "read-write", path = "./" }
]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 500

[fmt]
line_length = 80
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"

[lint]
ignore = ["erc20-unchecked-transfer"]

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]

optimizer = true
optimizer_runs = 200
verbosity = 4